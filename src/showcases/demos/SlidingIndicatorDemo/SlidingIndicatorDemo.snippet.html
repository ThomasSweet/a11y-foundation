<!-- Real radios underneath — arrow-key navigable, announced as a group. -->
<fieldset class="segmented">
  <legend class="visually-hidden">Choose a view</legend>
  <div class="track" style="--n: 3">
    <span class="indicator" aria-hidden="true"></span>
    <label><input type="radio" name="view" class="visually-hidden" /> List</label>
    <label><input type="radio" name="view" class="visually-hidden" /> Grid</label>
    <label><input type="radio" name="view" class="visually-hidden" /> Board</label>
  </div>
</fieldset>
