<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Correct-scheme first paint before any CSS parses (no white flash in dark mode). -->
    <meta name="color-scheme" content="light dark" />

    <!-- Lock the @layer order before any bundled CSS parses. In the production
         build Vite emits component styles in a separate file that can load
         before the global order declaration, which would otherwise register
         `components` as the lowest-priority layer and invert the cascade. -->
    <style>
      @layer reset, tokens, themes, base, layout, components, utilities, preferences;
    </style>

    <!-- Apply the saved theme before first paint so a reload never flashes
         the default palette. Must stay in sync with ThemeToggle. -->
    <script>
      try {
        var savedTheme = localStorage.getItem('abd-theme')
        if (savedTheme === 'light' || savedTheme === 'dark') {
          document.documentElement.dataset.theme = savedTheme
        } else if (/^(ocean|midnight|sunset|cobalt|teal|amber)$/.test(savedTheme)) {
          document.documentElement.dataset.preset = savedTheme
        }
      } catch (e) {}
    </script>

    <title>Accessible by default — an accessibility-first styling playground</title>
    <meta
      name="description"
      content="An accessibility-first styling foundation — a playground showing how modern CSS and the web platform handle accessibility natively, with little to no JavaScript."
    />

    <!-- Icons: SVG for modern browsers (sharp at any size), PNG fallbacks. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Browser chrome colour follows the site's light/dark surfaces. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f0f0f" />

    <!-- Open Graph / Twitter for link sharing. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://accessible-by-default.dev/" />
    <meta property="og:title" content="Accessible by default" />
    <meta
      property="og:description"
      content="Modern CSS handles accessibility natively — with little to no JavaScript. A playground of progressive enhancements, tested to WCAG 2.2 AA."
    />
    <meta property="og:image" content="https://accessible-by-default.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Accessible by default" />
    <meta
      name="twitter:description"
      content="Modern CSS handles accessibility natively — with little to no JavaScript."
    />
    <meta name="twitter:image" content="https://accessible-by-default.dev/og-image.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
